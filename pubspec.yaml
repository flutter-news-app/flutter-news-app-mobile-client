name: verity_mobile
description: " 📰 Verity Mobile is a production-ready news reader built with Flutter, focusing on performance, personalization, and secure monetization. "
version: 2.0.0
publish_to: none
homepage: https://github.com/verity-hq/
repository: https://github.com/verity-hq/verity-mobile
documentation: https://github.com/verity-hq/verity-mobile/wiki
issue_tracker: https://github.com/verity-hq/verity-mobile/issues
funding:
  - https://github.com/sponsors/verity-hq
topics:
  - flutter
  - flutter-full-app
  - flutter-news-app
  - flutter-news-app-mobile-client
  - flutter-news-app-source-code
screenshots:
  - description: The veritas news stack logo.
    path: assets/logo/verity-news-stack-logo.png
  
environment:
  sdk: ^3.9.0

dependencies:
  bloc: ^9.0.1
  bloc_concurrency: ^0.3.0
  collection: ^1.19.1
  core:
    git:
      url: https://github.com/verity-hq/core.git
      ref: 01ddd253e94303d86d9fbcc977acb2019f239fb4
  core_ui:
    git:
      url: https://github.com/verity-hq/core-ui.git
      ref: 051cdf79b85e3ffa124c90aa00cf873d722ae31c
  equatable: ^2.0.7
  firebase_analytics: ^12.1.0
  firebase_core: ^4.2.1
  firebase_messaging: ^16.0.4
  flex_color_scheme: ^8.3.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_inappwebview: 6.1.5
  flutter_launcher_icons: ^0.14.4
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.4.6
  go_router: ^16.2.4
  google_fonts: ^6.3.2
  google_mobile_ads: ^6.0.0
  http_parser: ^4.1.2
  image_picker: ^1.2.1
  in_app_review: ^2.0.11
  intl: ^0.20.2
  js_interop: ^0.0.1
  logging: ^1.3.0
  meta: ^1.16.0
  mixpanel_flutter: ^2.4.4
  onesignal_flutter: ^5.3.4
  package_info_plus: ^9.0.0
  pinput: ^5.0.1
  pub_semver: ^2.2.0
  share_plus: ^11.1.0
  smooth_page_indicator: ^2.0.1
  stream_transform: ^2.1.1
  timeago: ^3.7.1
  url_launcher: ^6.3.1
  uuid: ^4.4.0

dev_dependencies:
  bloc_test: ^10.0.0
  firebase_core_platform_interface: ^6.0.2
  firebase_messaging_platform_interface: ^4.7.6
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  plugin_platform_interface: ^2.1.8
  very_good_analysis: ^10.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/logo/

flutter_launcher_icons:
  image_path: assets/logo/verity-news-stack-logo.png
  android: "launcher_icon"
  min_sdk_android: 21
  web:
    generate: true
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"

flutter_native_splash:
  color: "#FFFFFF"
  color_dark: "#212121"
  image: assets/logo/verity-news-stack-logo.png
  android: true
  ios: true
  web: false
